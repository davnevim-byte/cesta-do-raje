<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Cesta do Ráje</title>

    <meta name="theme-color" content="#060810" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cesta do Ráje" />
    <link rel="apple-touch-icon" sizes="180x180" href="/cesta-do-raje/apple-touch-icon.png" />
    <link rel="icon" type="image/x-icon" href="/cesta-do-raje/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #060810;
        font-family: 'Inter', Georgia, sans-serif;
        overflow: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        background: #060810;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }

      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* Strom SVG */
      .loader-tree {
        width: 90px;
        height: 90px;
        margin-bottom: 28px;
        animation: treeFloat 3s ease-in-out infinite;
      }

      @keyframes treeFloat {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-8px); }
      }

      /* Záře pod stromem */
      .loader-glow {
        width: 70px;
        height: 12px;
        background: radial-gradient(ellipse, rgba(29,158,117,0.5) 0%, transparent 70%);
        margin-top: -18px;
        margin-bottom: 28px;
        animation: glowPulse 3s ease-in-out infinite;
      }

      @keyframes glowPulse {
        0%, 100% { opacity: 0.4; transform: scaleX(0.8); }
        50%       { opacity: 0.9; transform: scaleX(1.1); }
      }

      /* Název hry */
      .loader-title {
        font-size: 22px;
        font-weight: 700;
        color: #9FE1CB;
        letter-spacing: 2px;
        margin-bottom: 6px;
        font-family: Georgia, serif;
      }

      .loader-subtitle {
        font-size: 12px;
        color: #1D9E75;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 36px;
        opacity: 0.7;
      }

      /* Tečky loading animace */
      .loader-dots {
        display: flex;
        gap: 8px;
      }

      .loader-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #1D9E75;
        animation: dotBounce 1.2s ease-in-out infinite;
      }

      .loader-dots span:nth-child(1) { animation-delay: 0s; }
      .loader-dots span:nth-child(2) { animation-delay: 0.18s; }
      .loader-dots span:nth-child(3) { animation-delay: 0.36s; }

      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40%            { transform: scale(1.2); opacity: 1; background: #9FE1CB; }
      }

      /* Světlušky */
      .sparkle {
        position: absolute;
        border-radius: 50%;
        background: #9FE1CB;
        animation: sparkleFly linear infinite;
        pointer-events: none;
      }

      @keyframes sparkleFly {
        0%   { opacity: 0; transform: translateY(0) scale(0); }
        20%  { opacity: 0.8; transform: translateY(-20px) scale(1); }
        80%  { opacity: 0.4; }
        100% { opacity: 0; transform: translateY(-80px) scale(0.3); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen — viditelný okamžitě, ještě před React -->
    <div id="app-loader">

      <!-- Světlušky na pozadí -->
      <div class="sparkle" style="width:5px;height:5px;left:20%;top:60%;animation-duration:2.8s;animation-delay:0s;opacity:0.6"></div>
      <div class="sparkle" style="width:4px;height:4px;left:75%;top:55%;animation-duration:3.2s;animation-delay:0.5s;opacity:0.5"></div>
      <div class="sparkle" style="width:6px;height:6px;left:35%;top:70%;animation-duration:2.5s;animation-delay:1s;opacity:0.7"></div>
      <div class="sparkle" style="width:3px;height:3px;left:60%;top:65%;animation-duration:3.5s;animation-delay:0.3s;opacity:0.4"></div>
      <div class="sparkle" style="width:5px;height:5px;left:50%;top:75%;animation-duration:2.9s;animation-delay:1.4s;opacity:0.6"></div>
      <div class="sparkle" style="width:4px;height:4px;left:25%;top:40%;animation-duration:3.1s;animation-delay:0.8s;opacity:0.5"></div>
      <div class="sparkle" style="width:3px;height:3px;left:80%;top:35%;animation-duration:2.6s;animation-delay:1.8s;opacity:0.4"></div>

      <!-- Strom SVG -->
      <svg class="loader-tree" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="g1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#60C890"/>
            <stop offset="100%" stop-color="#0d4a18"/>
          </radialGradient>
          <radialGradient id="g2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1D9E75"/>
            <stop offset="100%" stop-color="#083a20"/>
          </radialGradient>
          <radialGradient id="g3" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#9FE1CB"/>
            <stop offset="100%" stop-color="#1D9E75"/>
          </radialGradient>
        </defs>
        <!-- Kmen -->
        <rect x="44" y="68" width="12" height="24" rx="4" fill="#6b3a18"/>
        <!-- Koruny — vrstvené -->
        <ellipse cx="50" cy="70" rx="26" ry="22" fill="url(#g1)"/>
        <ellipse cx="50" cy="56" rx="22" ry="19" fill="url(#g2)"/>
        <ellipse cx="50" cy="43" rx="17" ry="15" fill="url(#g1)"/>
        <ellipse cx="50" cy="31" rx="12" ry="11" fill="url(#g2)"/>
        <ellipse cx="50" cy="21" rx="8"  ry="8"  fill="url(#g3)"/>
        <!-- Světlušky na stromě -->
        <circle cx="35" cy="58" r="2.5" fill="#FAC775" opacity="0.9"/>
        <circle cx="65" cy="52" r="2"   fill="#9FE1CB" opacity="0.8"/>
        <circle cx="42" cy="38" r="2"   fill="#FAC775" opacity="0.7"/>
        <circle cx="60" cy="34" r="1.5" fill="#9FE1CB" opacity="0.9"/>
        <circle cx="50" cy="18" r="3"   fill="#f5d76e" opacity="0.95"/>
      </svg>

      <div class="loader-glow"></div>

      <div class="loader-title">Cesta do Ráje</div>
      <div class="loader-subtitle">Biblická hra</div>

      <div class="loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Skryj loader jakmile React připraví DOM
      // MutationObserver sleduje kdy #root dostane obsah
      const loader = document.getElementById('app-loader');
      const root   = document.getElementById('root');

      const observer = new MutationObserver(() => {
        if (root.children.length > 0) {
          observer.disconnect();
          // Krátká pauza aby React dokončil render
          setTimeout(() => {
            loader.classList.add('hidden');
            // Odstraň z DOM po fade-outu
            setTimeout(() => loader.remove(), 700);
          }, 200);
        }
      });

      observer.observe(root, { childList: true });
    </script>
  </body>
</html>
